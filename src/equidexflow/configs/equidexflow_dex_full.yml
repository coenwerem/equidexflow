# EquiDexFlow — dexterous grasp generation (full point-cloud, dexgrasp DB)
# Run:
#   python train.py --config configs/equidexflow_dex_full.yml --device 0

model:
  name: equidexflow_dex
  p_uncond: 0.1
  guidance: 2.0
  num_ode_steps: 10

data:
  # Global scalars read directly by DexGraspTrainer for physics-loss computation.
  mu: 0.5
  object_mass: 0.2

  train:
    dataset:
      name: dexgrasp
      grasp_db_dir: ${oc.env:EQUIDEXFLOW_DATA_DIR}/dexgraspdb/v3/allegro
      object_mesh_dir: ${oc.env:EQUIDEXFLOW_OBJECTS_DIR,${oc.env:EQUIDEXFLOW_DATA_DIR}/objects}
      n_object_points: 512
      max_contacts: 64
      mu: 0.5
      object_mass: 0.2
      augment: true
      split: train          # overwritten by get_dataloader(), kept as fallback
      object_names: null    # null = all 81 objects (8 core + 49 EGAD + 24 YCB)
    batch_size: 8
    num_workers: 4
    shuffle: true

  val:
    dataset:
      name: dexgrasp
      grasp_db_dir: ${oc.env:EQUIDEXFLOW_DATA_DIR}/dexgraspdb/v3/allegro
      object_mesh_dir: ${oc.env:EQUIDEXFLOW_OBJECTS_DIR,${oc.env:EQUIDEXFLOW_DATA_DIR}/objects}
      n_object_points: 512
      max_contacts: 64
      mu: 0.5
      object_mass: 0.2
      augment: false
      split: val
      object_names: null
    batch_size: 2
    num_workers: 4
    shuffle: false

  test:
    dataset:
      name: dexgrasp
      grasp_db_dir: ${oc.env:EQUIDEXFLOW_DATA_DIR}/dexgraspdb/v3/allegro
      object_mesh_dir: ${oc.env:EQUIDEXFLOW_OBJECTS_DIR,${oc.env:EQUIDEXFLOW_DATA_DIR}/objects}
      n_object_points: 512
      max_contacts: 64
      mu: 0.5
      object_mass: 0.2
      augment: false
      split: test
      object_names: null
    batch_size: 2
    num_workers: 4
    shuffle: false

training:
  optimizer: Adam
  lr: 1.0e-4
  weight_decay: 1.0e-6
  epochs: 1000
  batch_size: 2           # informational — batch_size is set per split in data above

  loss_weights:
    flow: 1.0
    hand_q: 1.0
    contact: 100.0
    normal: 1.0
    force: 1.0
    physics_wrench: 0.1
    physics_friction: 0.1
    physics_collision: 0.1

  print_interval: 100
  val_interval: 500
  # ODE-based eval deferred to scripts/equidex/eval_equidexflow_table.py
  # (runs one variant at a time on the full 16 GB GPU). Setting this past
  # the total step count avoids OOM under 3-way GPU sharing during training.
  eval_interval: 99999999
  save_interval: 5000

evaluation:
  num_samples: 10
  mu: 0.5
  physics_weights:
    beta1: 1.0
    beta2: 2.0
    beta3: 1.0
    beta4: 0.5

logging:
  log_dir: logs/equidexflow_dex_full
  exp_name: equidexflow_dex_full
