# Allegro "Full" variant — flow hand_q decoder + reach loss + grasp-center frame.
#
# Fixes deterministic hand_q decoder mode-collapse: the deterministic decoder
# outputs a near-constant pose (per-joint std ~0.01 rad vs GT ~0.5 rad),
# ignoring the object entirely. The RealNVP flow decoder can express multiple
# modes per object, giving the reach loss input-dependent gradients to exploit.
#
# Changes vs equidexflow_dex_full_fc.yml:
#   hand_q_decoder: flow (RealNVP, 8 coupling layers)
#   force: 1.0 -> 0.1 (was dominating total at ~4-5, starving shared encoder)
#   reach: 100.0 (couples FK fingertips to predicted contacts)
model:
  hand: allegro
  name: equidexflow_dex
  p_uncond: 0.1
  guidance: 2.0
  num_ode_steps: 10
  wrist_frame: grasp_center
  hand_q_decoder: flow
  n_coupling_layers: 8
  checkpoint: null

data:
  mu: 0.5
  object_mass: 0.2
  train:
    dataset:
      name: dexgrasp
      grasp_db_dir: ${oc.env:EQUIDEXFLOW_DATA_DIR}/dexgraspdb/v3/allegro
      object_mesh_dir: ${oc.env:EQUIDEXFLOW_OBJECTS_DIR,${oc.env:EQUIDEXFLOW_DATA_DIR}/objects}
      n_object_points: 512
      max_contacts: 64
      mu: 0.5
      object_mass: 0.2
      augment: true
      split: train
      object_names: null
      wrist_frame: grasp_center
    batch_size: 8
    num_workers: 4
    shuffle: true
  val:
    dataset:
      name: dexgrasp
      grasp_db_dir: ${oc.env:EQUIDEXFLOW_DATA_DIR}/dexgraspdb/v3/allegro
      object_mesh_dir: ${oc.env:EQUIDEXFLOW_OBJECTS_DIR,${oc.env:EQUIDEXFLOW_DATA_DIR}/objects}
      n_object_points: 512
      max_contacts: 64
      mu: 0.5
      object_mass: 0.2
      augment: false
      split: val
      object_names: null
      wrist_frame: grasp_center
    batch_size: 2
    num_workers: 4
    shuffle: false
  test:
    dataset:
      name: dexgrasp
      grasp_db_dir: ${oc.env:EQUIDEXFLOW_DATA_DIR}/dexgraspdb/v3/allegro
      object_mesh_dir: ${oc.env:EQUIDEXFLOW_OBJECTS_DIR,${oc.env:EQUIDEXFLOW_DATA_DIR}/objects}
      n_object_points: 512
      max_contacts: 64
      mu: 0.5
      object_mass: 0.2
      augment: false
      split: test
      object_names: null
      wrist_frame: grasp_center
    batch_size: 2
    num_workers: 4
    shuffle: false

training:
  optimizer: Adam
  lr: 1.0e-4
  weight_decay: 1.0e-6
  epochs: 20
  batch_size: 2
  loss_weights:
    flow: 1.0
    hand_q: 1.0
    contact: 100.0
    normal: 1.0
    force: 0.1
    reach: 100.0
    physics_wrench: 0.1
    physics_friction: 0.1
    physics_collision: 100.0
  print_interval: 50
  val_interval: 200
  save_interval: 500
  eval_interval: 99999999

evaluation:
  num_samples: 10
  mu: 0.5
  physics_weights:
    beta1: 1.0
    beta2: 2.0
    beta3: 1.0
    beta4: 0.5

logging:
  log_dir: logs/equidexflow_dex_full_fc_reach
  exp_name: equidexflow_dex_full_fc_reach
